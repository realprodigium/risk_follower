services:
  - type: web
    name: co2-app
    runtime: docker
    region: oregon
    plan: free
    scaling:
      minInstances: 1
      maxInstances: 1
    envVars:
      - key: PORT
        value: 10000
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: info
      - key: ENABLE_MQTT
        value: false
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 60
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: MQTT_BROKER
        sync: false
      - key: MQTT_PORT
        sync: false
      - key: MQTT_TOPIC
        sync: false
      - key: MQTT_USER
        sync: false
      - key: MQTT_PASSWORD
        sync: false
      - key: MQTT_TLS_ENABLED
        value: "true"

  - type: worker
    name: co2-mqtt-worker
    runtime: docker
    region: oregon
    plan: free
    dockerCommand: python -m app.services.mqtt_worker
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: info
      - key: ENABLE_MQTT
        value: "true"
      - key: DATABASE_URL
        sync: false
      - key: MQTT_BROKER
        sync: false
      - key: MQTT_PORT
        sync: false
      - key: MQTT_TOPIC
        sync: false
      - key: MQTT_USER
        sync: false
      - key: MQTT_PASSWORD
        sync: false
      - key: MQTT_TLS_ENABLED
        value: "true"