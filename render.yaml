services:
  - type: web
    name: co2-monitor
    runtime: docker
    plan: standard
    
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: DATABASE_URL
        sync: false 
      - key: MQTT_BROKER
        value: befdad2b36094669b44547e5fb171274.s1.eu.hivemq.cloud
      - key: MQTT_PORT
        value: "8883"
      - key: MQTT_TOPIC
        value: esp32/device001/#
      - key: MQTT_USER
        sync: false
      - key: MQTT_PASSWORD
        sync: false
      - key: MQTT_TLS_ENABLED
        value: "True"
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: BACKEND_CORS_ORIGINS
        value: "*"
      - key: SECRET_KEY
        generateValue: true
    
    dockerfilePath: Dockerfile
    dockerContext: .
    startCommand: gunicorn app.main:app -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:${PORT} --timeout 120 --keep-alive 5
    
    healthCheckPath: /health
    
    autoDeploy: true

