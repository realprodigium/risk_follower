services:
  - type: web
    name: co2-monitor
    runtime: docker
    plan: standard
    
    # ─────────────────────────────────────────────────────────────────────────
    # Environment Variables
    # ─────────────────────────────────────────────────────────────────────────
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: DATABASE_URL
        sync: false # Set this in Render Dashboard to your Supabase URL
      - key: MQTT_BROKER
        value: your-cluster-id.s1.eu.hivemq.cloud
      - key: MQTT_PORT
        value: "8883"
      - key: MQTT_TOPIC
        value: brewery/sensors/#
      - key: MQTT_USER
        sync: false
      - key: MQTT_PASSWORD
        sync: false
      - key: MQTT_TLS_ENABLED
        value: "True"
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: BACKEND_CORS_ORIGINS
        value: "*"
      - key: SECRET_KEY
        generateValue: true
    
    # ─────────────────────────────────────────────────────────────────────────
    # Build and Deploy Settings
    # ─────────────────────────────────────────────────────────────────────────
    dockerfile: Dockerfile
    dockerContext: .
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port ${PORT}
    
    # Healthcheck
    healthCheckPath: /health
    healthCheckInterval: 10
    healthCheckTimeout: 5
    
    # Auto-deploy from GitHub
    autoDeploy: true
